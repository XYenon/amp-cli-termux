name: Auto Patch and Update Amp CLI (Release version)

on:
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-amp:
    runs-on: ubuntu-26.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Compile bun-termux wrapper and shim
        run: |
          # Compile bun-termux wrapper (Android Bionic)
          $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-aarch64/bin/clang \
            --target=aarch64-linux-android24 -O3 -Wl,-z,norelro \
            -o bun-termux-aarch64 bun-termux.c
          
          # Compile bun-shim (glibc)
          gcc -shared -fPIC -O3 -o bun-shim-aarch64.so shim.c -ldl

      - name: Fetch latest Amp CLI version
        id: get_version
        run: |
          LATEST_VERSION=$(curl -fsSL https://static.ampcode.com/cli/cli-version.txt | tr -d '\r\n[:space:]')
          echo "LATEST_VERSION=$LATEST_VERSION" >> $GITHUB_ENV
          echo "Latest version: $LATEST_VERSION"

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ env.LATEST_VERSION }}" >/dev/null 2>&1; then
            echo "Version ${{ env.LATEST_VERSION }} is already released."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "New version detected. Proceeding to patch and release."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Patch and Release
        if: steps.check_release.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Download official amp-linux-arm64
          mkdir -p download
          curl -fsSL "https://static.ampcode.com/cli/${{ env.LATEST_VERSION }}/amp-linux-arm64.gz" -o download/amp-linux-arm64.gz
          gunzip download/amp-linux-arm64.gz
          
          # 2. Patch using replace_runtime.py and the compiled wrapper
          mkdir -p "cli/${{ env.LATEST_VERSION }}"
          python3 replace_runtime.py download/amp-linux-arm64 "cli/${{ env.LATEST_VERSION }}/amp-linux-arm64" --wrapper bun-termux-aarch64
          
          # 3. Calculate SHA256 of the decompressed patched binary
          sha256sum "cli/${{ env.LATEST_VERSION }}/amp-linux-arm64" | cut -d' ' -f1 > "cli/${{ env.LATEST_VERSION }}/linux-arm64-amp.sha256"
          
          # 4. Compress the patched binary
          gzip -f "cli/${{ env.LATEST_VERSION }}/amp-linux-arm64"
          
          # 5. Create GitHub Release and upload assets
          gh release create "${{ env.LATEST_VERSION }}" \
            "cli/${{ env.LATEST_VERSION }}/amp-linux-arm64.gz" \
            "cli/${{ env.LATEST_VERSION }}/linux-arm64-amp.sha256" \
            "bun-termux-aarch64" \
            "bun-shim-aarch64.so" \
            --title "Amp CLI ${{ env.LATEST_VERSION }}" \
            --notes "Automated patch release of Amp CLI ${{ env.LATEST_VERSION }} for Termux compiled natively on ARM64 runner."
          
          # 6. Update global version file in git
          mkdir -p cli
          echo "${{ env.LATEST_VERSION }}" > cli/cli-version.txt
          
          # Clean up temporary build artifacts (only commit the version txt)
          rm -rf "cli/${{ env.LATEST_VERSION }}"
          rm -rf download

      - name: Commit version file
        if: steps.check_release.outputs.skip != 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add cli/cli-version.txt
          git commit -m "Update version file to ${{ env.LATEST_VERSION }}"
          git push
