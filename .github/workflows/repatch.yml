name: Auto Patch and Update Amp CLI (Release version)

on:
  schedule:
    - cron: "0 */6 * * *" # Run every 6 hours
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-amp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Fetch latest Amp CLI version
        id: get_version
        run: |
          LATEST_VERSION=$(curl -fsSL https://static.ampcode.com/cli/cli-version.txt | tr -d '\r\n[:space:]')
          echo "LATEST_VERSION=$LATEST_VERSION" >> $GITHUB_ENV
          echo "Latest version: $LATEST_VERSION"

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.github/scripts/check_release.sh

      - name: Install cross-compilation tools
        if: steps.check_release.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Setup Android NDK
        if: steps.check_release.outputs.skip != 'true'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Compile bun-termux wrapper and shim
        if: steps.check_release.outputs.skip != 'true'
        run: ./.github/scripts/compile.sh

      - name: Patch and build
        if: steps.check_release.outputs.skip != 'true'
        run: ./.github/scripts/patch.sh

      - name: Commit version file
        if: steps.check_release.outputs.skip != 'true'
        run: ./.github/scripts/commit.sh

      - name: Create release
        if: steps.check_release.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.github/scripts/release.sh
